const ITEMS_PER_PAGE = 6;
const totalPages = 1;

  const FALLBACK_IMAGE = 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=450&h=600&fit=crop';
  
  let currentPage = 1;
  const itemsPerPage = ITEMS_PER_PAGE;
  
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const pageText = document.getElementById('currentPageText');
  const grid = document.getElementById('possessionsGrid');

  function renderPage(page) {
    const start = (page - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const currentItems = possessions.slice(start, end);
    
    grid.innerHTML = currentItems.map(item => `
      <article class="possession-card" key="${item.id}">
        <div class="possession-image-wrapper">
          <img 
            src="${item.imageUrl}" 
            alt="${item.title}" 
            class="possession-image" 
            loading="lazy"
            decoding="async"
            width="450"
            height="600"
            onerror="this.src='${FALLBACK_IMAGE}'; this.onerror=null;"
          />
        </div>
        <div class="possession-content">
          <h2 class="possession-title">${item.title}</h2>
          <p class="possession-description">${item.description}</p>
        </div>
      </article>
    `).join('');
    
    pageText.textContent = '第 ' + page + ' 页 / 共 ' + totalPages + ' 页';
    prevBtn.disabled = page === 1;
    nextBtn.disabled = page === totalPages;
  }

  prevBtn.addEventListener('click', function() {
    if (currentPage > 1) {
      currentPage--;
      renderPage(currentPage);
    }
  });

  nextBtn.addEventListener('click', function() {
    if (currentPage < totalPages) {
      currentPage++;
      renderPage(currentPage);
    }
  });
})();</script>
